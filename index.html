<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assignment Submission Portal</title>
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
            --text-muted: #6c757d;
            --accent: #4f46e5; /* Modern Indigo */
            --accent-hover: #4338ca;
            --border-color: #e5e7eb;
            --success: #10b981;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            position: relative;
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-main);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.2s ease;
            background-color: #fafafa;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .file-dropzone {
            position: relative;
            border: 2px dashed var(--border-color);
            padding: 32px 20px;
            border-radius: 8px;
            text-align: center;
            background-color: #fafafa;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .file-dropzone:hover {
            border-color: var(--accent);
            background-color: rgba(79, 70, 229, 0.02);
        }

        .file-dropzone input[type="file"] {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .dropzone-icon {
            font-size: 32px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .dropzone-text {
            font-size: 14px;
            color: var(--text-muted);
        }

        .file-name-preview {
            margin-top: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--accent);
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
        }

        button:hover { background-color: var(--accent-hover); }
        button:disabled { background-color: var(--text-muted); cursor: not-allowed; opacity: 0.6; }

        /* Modern Notification Overlay */
        .status-overlay {
            display: none;
            text-align: center;
            padding: 20px 10px;
            animation: fadeIn 0.3s ease forward;
        }

        .status-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .status-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .status-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="formContent">
        <header>
            <h1>Submit Assignment</h1>
            <p>Your submission will be uploaded securely and privately.</p>
        </header>

        <form id="uploadForm">
            <div class="input-group">
                <label for="studentName">Full Name</label>
                <input type="text" id="studentName" required>
            </div>
            
            <div class="input-group">
                <label for="studentId">Roll Number</label>
                <input type="text" id="studentId" required>
            </div>
            
            <div class="input-group">
                <label>Assignment File</label>
                <div class="file-dropzone">
                    <span class="dropzone-icon">📁</span>
                    <p class="dropzone-text" id="dropzoneText">Click or drag file here to upload</p>
                    <div class="file-name-preview" id="fileNamePreview"></div>
                    <input type="file" id="file" accept=".pdf" required>
                </div>
            </div>

            <button type="submit" id="submitBtn">Submit</button>
        </form>
    </div>
    
    <div id="statusOverlay" class="status-overlay">
        <div class="status-icon" id="statusIcon">⏳</div>
        <div class="status-title" id="statusTitle">Uploading...</div>
        <div class="status-desc" id="statusDesc">Please keep this page open while your assignment is being transmitted.</div>
        <button id="resetBtn" style="display:none; background-color: var(--text-main);" onclick="window.location.reload()">Submit Another Assignment</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzQfKoZGiQxtKNov0eC2xjlFhv2YCeMnNv_sB01w48YvEQlY2VymXvoXdDA1B8JIqfWJA/exec";

    const fileInput = document.getElementById('file');
    const dropzoneText = document.getElementById('dropzoneText');
    const fileNamePreview = document.getElementById('fileNamePreview');
    const formContent = document.getElementById('formContent');
    const statusOverlay = document.getElementById('statusOverlay');
    const statusIcon = document.getElementById('statusIcon');
    const statusTitle = document.getElementById('statusTitle');
    const statusDesc = document.getElementById('statusDesc');
    const resetBtn = document.getElementById('resetBtn');

    // Handle file input selection UI
    fileInput.addEventListener('change', function() {
        if (fileInput.files.length > 0) {
            dropzoneText.innerText = "File selected:";
            fileNamePreview.innerText = fileInput.files[0].name;
            fileNamePreview.style.display = "block";
        } else {
            dropzoneText.innerText = "Click or drag file here to upload";
            fileNamePreview.style.display = "none";
        }
    });

    document.getElementById('uploadForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const selectedFile = fileInput.files[0];
        // Strict verification: Reject the file if it does not end in .pdf
    if (selectedFile && !selectedFile.name.toLowerCase().endsWith('.pdf')) {
        alert("Submission Rejected: Only PDF files (.pdf) are allowed for this assignment.");
        
        // Reset the form upload layout UI so they can select a new file
        fileInput.value = "";
        dropzoneText.innerText = "Click or drag file here to upload";
        fileNamePreview.style.display = "none";
        return; // This completely stops the file from sending to your Google Drive
    }
        // Instantly switch to the loading state screen
        formContent.style.display = "none";
        statusOverlay.style.display = "block";
        statusIcon.innerText = "⏳";
        statusTitle.innerText = "Uploading Securely...";
        statusDesc.innerText = "Processing your document and saving it. Please hold on.";

        const reader = new FileReader();
        reader.readAsDataURL(selectedFile);
        
        reader.onload = function() {
            const formData = new URLSearchParams();
            formData.append('fileData', reader.result);
            formData.append('fileName', selectedFile.name);
            formData.append('studentName', document.getElementById('studentName').value);
            formData.append('studentId', document.getElementById('studentId').value);

            fetch(WEB_APP_URL, {
                method: 'POST',
                body: formData,
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' }
            })
            .then(response => response.json())
            .then(data => {
                if(data.result === "success") {
                    // Huge, clear success screen
                    statusIcon.innerText = "✨";
                    statusTitle.innerText = "Submission Successful!";
                    statusTitle.style.color = "var(--success)";
                    statusDesc.innerText = "Your assignment has been securely saved. You can close this window now.";
                    resetBtn.style.display = "block";
                } else {
                    // Clear error state screen
                    statusIcon.innerText = "❌";
                    statusTitle.innerText = "Submission Failed";
                    statusTitle.style.color = "#991b1b";
                    statusDesc.innerText = "Server Error: " + data.error + "\n\nPlease click below to try again.";
                    resetBtn.innerText = "Try Again";
                    resetBtn.style.display = "block";
                }
            })
            .catch(error => {
                // Network breakdown screen
                statusIcon.innerText = "📡";
                statusTitle.innerText = "Connection Error";
                statusTitle.style.color = "#991b1b";
                statusDesc.innerText = "Could not reach the upload server. Please double-check your network connection and try again.";
                resetBtn.innerText = "Try Again";
                resetBtn.style.display = "block";
            });
        };
    });
</script>

</body>
</html>
